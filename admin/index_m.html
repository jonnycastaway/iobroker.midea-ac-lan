<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midea AC LAN</title>
</head>
<body>
    <div id="root">
        <div class="form-group">
            <label for="ip_address">AC IP Address *</label>
            <input type="text" id="ip_address" placeholder="0.0.0.0">
        </div>

        <div class="form-group">
            <label for="device_id">Device ID *</label>
            <input type="text" id="device_id" placeholder="0123456789012345">
        </div>

        <div class="form-group">
            <label for="use_cloud_auth">
                <input type="checkbox" id="use_cloud_auth">
                Use Cloud Authentication
            </label>
        </div>

        <div id="cloud_credentials" style="display: none;">
            <div class="form-group">
                <label for="cloud_username">Cloud Username / Email</label>
                <input type="text" id="cloud_username" placeholder="user@example.com">
            </div>

            <div class="form-group">
                <label for="cloud_password">Cloud Password</label>
                <input type="password" id="cloud_password" placeholder="password">
            </div>
        </div>

        <div class="form-group">
            <label for="token">Token (64 characters)</label>
            <input type="text" id="token" placeholder="64 character hex string">
        </div>

        <div class="form-group">
            <label for="key">Key (64 characters)</label>
            <input type="text" id="key" placeholder="64 character hex string">
        </div>

        <div class="form-group">
            <label for="poll_interval">Poll Interval (seconds)</label>
            <input type="number" id="poll_interval" value="60" min="10" max="3600">
        </div>
    </div>

    <script>
        function load(_callback) {
            const settings = systemAdapter.native || {};

            document.getElementById('ip_address').value = settings.ip_address || '';
            document.getElementById('device_id').value = settings.device_id || '';
            document.getElementById('token').value = settings.token || '';
            document.getElementById('key').value = settings.key || '';
            document.getElementById('cloud_username').value = settings.cloud_username || '';
            document.getElementById('cloud_password').value = settings.cloud_password || '';
            document.getElementById('use_cloud_auth').checked = settings.use_cloud_auth || false;
            document.getElementById('poll_interval').value = settings.poll_interval || 60;

            updateCloudVisibility();
            if (_callback) _callback();
        }

        function updateCloudVisibility() {
            const useCloud = document.getElementById('use_cloud_auth').checked;
            document.getElementById('cloud_credentials').style.display = useCloud ? 'block' : 'none';
        }

        function save(callback) {
            const obj = {
                native: {
                    ip_address: document.getElementById('ip_address').value.trim(),
                    device_id: document.getElementById('device_id').value.trim(),
                    token: document.getElementById('token').value.trim(),
                    key: document.getElementById('key').value.trim(),
                    cloud_username: document.getElementById('cloud_username').value.trim(),
                    cloud_password: document.getElementById('cloud_password').value,
                    use_cloud_auth: document.getElementById('use_cloud_auth').checked,
                    poll_interval: parseInt(document.getElementById('poll_interval').value) || 60
                }
            };

            sendTo('system.adapter.midea-ac-lan', 'save', obj, (result) => {
                if (callback) callback(result);
            });
        }

        function showError(error) {
            console.error(error);
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('use_cloud_auth').addEventListener('change', updateCloudVisibility);
        });
    </script>
</body>
</html>
