<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Midea AC LAN</title>
</head>
<body>
    <div class="section">
        <h2>Midea AC LAN - Configuration</h2>
    </div>

    <div class="section">
        <h3>Connection Settings</h3>
        <table style="width: 100%;">
            <tr>
                <td style="width: 200px;">AC IP Address *:</td>
                <td><input type="text" id="ip_address" style="width: 200px;"></td>
            </tr>
            <tr>
                <td>Device ID *:</td>
                <td><input type="text" id="device_id" style="width: 200px;"></td>
            </tr>
        </table>
    </div>

    <div class="section">
        <h3>Cloud Authentication</h3>
        <input type="checkbox" id="use_cloud_auth">
        <label for="use_cloud_auth" style="display: inline;">Use Cloud Authentication</label>
        <br><br>
        <div id="cloudSection" style="display: none;">
            <table style="width: 100%;">
                <tr>
                    <td style="width: 200px;">Cloud Username:</td>
                    <td><input type="text" id="cloud_username" style="width: 200px;"></td>
                </tr>
                <tr>
                    <td>Cloud Password:</td>
                    <td><input type="password" id="cloud_password" style="width: 200px;"></td>
                </tr>
            </table>
        </div>
    </div>

    <div class="section">
        <h3>Token & Key (from config file)</h3>
        <table style="width: 100%;">
            <tr>
                <td style="width: 200px;">Token:</td>
                <td><input type="text" id="token" style="width: 400px;"></td>
            </tr>
            <tr>
                <td>Key:</td>
                <td><input type="text" id="key" style="width: 400px;"></td>
            </tr>
        </table>
    </div>

    <div class="section">
        <h3>Polling</h3>
        <table style="width: 100%;">
            <tr>
                <td style="width: 200px;">Poll Interval (seconds):</td>
                <td><input type="number" id="poll_interval" value="60" min="10" max="3600" style="width: 100px;"></td>
            </tr>
        </table>
    </div>

    <script>
        function load(settings, callback) {
            settings = settings || {};
            settings.native = settings.native || {};

            document.getElementById('ip_address').value = settings.native.ip_address || '';
            document.getElementById('device_id').value = settings.native.device_id || '';
            document.getElementById('token').value = settings.native.token || '';
            document.getElementById('key').value = settings.native.key || '';
            document.getElementById('cloud_username').value = settings.native.cloud_username || '';
            document.getElementById('cloud_password').value = settings.native.cloud_password || '';
            document.getElementById('use_cloud_auth').checked = settings.native.use_cloud_auth || false;
            document.getElementById('poll_interval').value = settings.native.poll_interval || 60;

            updateCloudVisibility();
            if (callback) callback();
        }

        function updateCloudVisibility() {
            var checked = document.getElementById('use_cloud_auth').checked;
            document.getElementById('cloudSection').style.display = checked ? 'block' : 'none';
        }

        function save(callback) {
            var native = {
                ip_address: document.getElementById('ip_address').value.trim(),
                device_id: document.getElementById('device_id').value.trim(),
                token: document.getElementById('token').value.trim(),
                key: document.getElementById('key').value.trim(),
                cloud_username: document.getElementById('cloud_username').value.trim(),
                cloud_password: document.getElementById('cloud_password').value,
                use_cloud_auth: document.getElementById('use_cloud_auth').checked,
                poll_interval: parseInt(document.getElementById('poll_interval').value) || 60
            };

            sendTo('system.adapter.midea-ac-lan', 'save', { native: native }, function (result) {
                if (callback) callback(result && result.error);
            });
        }

        function showError(error) {
            console.error('Admin error:', error);
            alert('Error: ' + error);
        }

        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('use_cloud_auth').addEventListener('change', updateCloudVisibility);
        });
    </script>
</body>
</html>
