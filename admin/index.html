<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midea AC LAN</title>
</head>
<body>
    <div id="content">
        <div class="form-group">
            <label>AC IP Address *</label>
            <input type="text" id="ip_address" placeholder="0.0.0.0">
        </div>

        <div class="form-group">
            <label>Device ID *</label>
            <input type="text" id="device_id" placeholder="0123456789012345">
        </div>

        <div class="form-group">
            <label>
                <input type="checkbox" id="use_cloud_auth">
                Use Cloud Authentication
            </label>
        </div>

        <div id="cloudSection" style="display: none;">
            <div class="form-group">
                <label>Cloud Username / Email</label>
                <input type="text" id="cloud_username" placeholder="user@example.com">
            </div>

            <div class="form-group">
                <label>Cloud Password</label>
                <input type="password" id="cloud_password" placeholder="password">
            </div>
        </div>

        <div class="form-group">
            <label>Token (64 characters)</label>
            <input type="text" id="token" placeholder="64 character hex string">
        </div>

        <div class="form-group">
            <label>Key (64 characters)</label>
            <input type="text" id="key" placeholder="64 character hex string">
        </div>

        <div class="form-group">
            <label>Poll Interval (seconds)</label>
            <input type="number" id="poll_interval" value="60" min="10" max="3600">
        </div>

        <div id="message" style="display: none; padding: 10px; margin-top: 10px;"></div>
    </div>

    <script>
        function load(settings, callback) {
            try {
                settings = settings || {};
                settings.native = settings.native || {};

                document.getElementById('ip_address').value = settings.native.ip_address || '';
                document.getElementById('device_id').value = settings.native.device_id || '';
                document.getElementById('token').value = settings.native.token || '';
                document.getElementById('key').value = settings.native.key || '';
                document.getElementById('cloud_username').value = settings.native.cloud_username || '';
                document.getElementById('cloud_password').value = settings.native.cloud_password || '';
                document.getElementById('use_cloud_auth').checked = settings.native.use_cloud_auth || false;
                document.getElementById('poll_interval').value = settings.native.poll_interval || 60;

                updateCloudVisibility();
            } catch (e) {
                showMessage('Error loading: ' + e.message, true);
            }

            if (callback) callback();
        }

        function updateCloudVisibility() {
            var checked = document.getElementById('use_cloud_auth').checked;
            document.getElementById('cloudSection').style.display = checked ? 'block' : 'none';
        }

        function save(callback) {
            try {
                var native = {
                    ip_address: document.getElementById('ip_address').value.trim(),
                    device_id: document.getElementById('device_id').value.trim(),
                    token: document.getElementById('token').value.trim(),
                    key: document.getElementById('key').value.trim(),
                    cloud_username: document.getElementById('cloud_username').value.trim(),
                    cloud_password: document.getElementById('cloud_password').value,
                    use_cloud_auth: document.getElementById('use_cloud_auth').checked,
                    poll_interval: parseInt(document.getElementById('poll_interval').value) || 60
                };

                sendTo('system.adapter.midea-ac-lan', {
                    command: 'save',
                    message: { native: native }
                }, function (result) {
                    if (result && result.error) {
                        showMessage('Error: ' + result.error, true);
                    } else {
                        showMessage('Saved successfully!', false);
                    }
                    if (callback) callback(result && result.error);
                });
            } catch (e) {
                showMessage('Save error: ' + e.message, true);
                if (callback) callback(e.message);
            }
        }

        function showMessage(text, isError) {
            var el = document.getElementById('message');
            el.style.display = 'block';
            el.textContent = text;
            el.style.backgroundColor = isError ? '#f8d7da' : '#d4edda';
            el.style.color = isError ? '#721c24' : '#155724';
        }

        function showError(error) {
            console.error('Admin error:', error);
        }

        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('use_cloud_auth').addEventListener('change', updateCloudVisibility);
        });
    </script>
</body>
</html>
